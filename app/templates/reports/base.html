<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}ETF Research Report{% endblock %}</title>
    <style>
        :root {
            --primary: #1565c0;
            --primary-light: #42a5f5;
            --primary-dark: #0d47a1;
            --bg: #f5f7fa;
            --card-bg: #ffffff;
            --text: #1a1a2e;
            --text-secondary: #5a5a6e;
            --border: #e0e4e8;
            --success: #2e7d32;
            --warning: #ed6c02;
            --danger: #d32f2f;
            --info: #0288d1;
            --radius: 8px;
            --shadow: 0 2px 8px rgba(0,0,0,0.08);
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 24px;
        }

        /* Header */
        .report-header {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white;
            padding: 32px 24px;
            border-radius: var(--radius);
            margin-bottom: 24px;
            box-shadow: var(--shadow);
        }
        .report-header h1 {
            margin: 0 0 8px 0;
            font-size: 28px;
            font-weight: 600;
        }
        .report-header .meta {
            opacity: 0.85;
            font-size: 14px;
        }

        /* Cards */
        .card {
            background: var(--card-bg);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            margin-bottom: 24px;
            overflow: hidden;
        }
        .card-header {
            padding: 16px 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .card-header h2 {
            margin: 0;
            font-size: 18px;
            font-weight: 600;
            color: var(--primary-dark);
        }
        .card-body {
            padding: 20px;
        }

        /* Grid layouts */
        .grid-2 {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
        }
        .grid-3 {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
        }
        .grid-4 {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
        }

        /* Stat boxes */
        .stat-box {
            background: var(--bg);
            border-radius: var(--radius);
            padding: 16px;
            text-align: center;
        }
        .stat-box .stat-value {
            font-size: 24px;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 4px;
        }
        .stat-box .stat-label {
            font-size: 13px;
            color: var(--text-secondary);
        }
        .stat-box .stat-change {
            font-size: 13px;
            margin-top: 4px;
        }
        .stat-change.up { color: var(--danger); }
        .stat-change.down { color: var(--success); }

        /* Tables */
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }
        th {
            background: var(--bg);
            color: var(--text-secondary);
            font-weight: 600;
            text-align: left;
            padding: 12px 16px;
            border-bottom: 2px solid var(--border);
            white-space: nowrap;
        }
        td {
            padding: 12px 16px;
            border-bottom: 1px solid var(--border);
        }
        tr:hover td {
            background: #f8fafc;
        }
        tr:last-child td {
            border-bottom: none;
        }
        .text-right { text-align: right; }
        .text-center { text-align: center; }

        /* Badges */
        .badge {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
        }
        .badge-success { background: #e8f5e9; color: var(--success); }
        .badge-warning { background: #fff3e0; color: var(--warning); }
        .badge-danger { background: #ffebee; color: var(--danger); }
        .badge-info { background: #e3f2fd; color: var(--info); }
        .badge-primary { background: #e8eaf6; color: var(--primary); }

        /* Score bars */
        .score-bar-container {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .score-bar {
            flex: 1;
            height: 8px;
            background: var(--border);
            border-radius: 4px;
            overflow: hidden;
        }
        .score-bar-fill {
            height: 100%;
            border-radius: 4px;
            transition: width 0.3s ease;
        }
        .score-bar-fill.high { background: linear-gradient(90deg, var(--success), #66bb6a); }
        .score-bar-fill.medium { background: linear-gradient(90deg, var(--warning), #ffb74d); }
        .score-bar-fill.low { background: linear-gradient(90deg, var(--danger), #ef5350); }
        .score-value {
            font-size: 13px;
            font-weight: 600;
            min-width: 36px;
            text-align: right;
        }

        /* Rank */
        .rank {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            font-size: 13px;
            font-weight: 700;
        }
        .rank-1 { background: #ffd700; color: #5a4a00; }
        .rank-2 { background: #c0c0c0; color: #333; }
        .rank-3 { background: #cd7f32; color: white; }
        .rank-other { background: var(--bg); color: var(--text-secondary); }

        /* Footer */
        .report-footer {
            text-align: center;
            padding: 24px;
            color: var(--text-secondary);
            font-size: 12px;
            border-top: 1px solid var(--border);
            margin-top: 24px;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .grid-2, .grid-3, .grid-4 {
                grid-template-columns: 1fr;
            }
            .container {
                padding: 12px;
            }
            .report-header h1 {
                font-size: 22px;
            }
            table {
                font-size: 12px;
            }
            th, td {
                padding: 8px 10px;
            }
        }

        /* Print styles */
        @media print {
            body { background: white; }
            .card { box-shadow: none; border: 1px solid var(--border); }
            .report-header { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
        }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>
    <div class="container">
        {% block header %}
        <div class="report-header">
            <h1>{% block report_title %}ETF Research Report{% endblock %}</h1>
            <div class="meta">{% block report_meta %}{% endblock %}</div>
        </div>
        {% endblock %}

        {% block content %}{% endblock %}

        {% block footer %}
        <div class="report-footer">
            Generated at {{ generated_at }} | ETF Research Platform
        </div>
        {% endblock %}
    </div>
</body>
</html>
